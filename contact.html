<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matthew Copon — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-wrapper">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <a class="logo" href="index.html" title="Home">🌍</a>
      <nav>
        <a href="about.html" >About Me</a>
        <a href="index.html">My Works</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
      <div class="contact-page">

        <h1>Contact</h1>

        <!--
          NOTE: GitHub Pages serves only static files — there is no server to process form
          submissions. To make this form actually send emails, use a free service like
          Formspree (https://formspree.io). Replace YOUR_FORM_ID below with the ID you get
          after signing up, and change the action attribute accordingly.
          Example: action="https://formspree.io/f/YOUR_FORM_ID"
        -->
        <form
          class="contact-form"
          action="https://formspree.io/f/xqewbozr"
          method="POST"
        >
          <div class="form-group">
            <label for="name">Name <span class="required">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your Name..."
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Your Email Address..."
              required
            />
          </div>

          <div class="form-group">
            <label for="message">Message <span class="required">*</span></label>
            <textarea
              id="message"
              name="message"
              placeholder="Your Message..."
              required
            ></textarea>
          </div>

          <button type="submit" class="submit-btn">Submit</button>
        </form>

      </div>
    </main>
</body>
</html>
